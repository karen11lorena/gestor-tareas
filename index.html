<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"> <!--Define la codificacion de caracteres (utf-8 soporta acentos y ñ)--> 
    <meta name="viewport" content="width=, initial-scale=1.0"> <!--// Hace que la pagina se adapte a cualquier pantalla --> 
    <link rel="stylesheet" href="style.css"> <!-- Conecta el archivo css-->
    
    <title>Gestor de Tareas</title> <!-- Titulo que aparece en la pestaña del navegador-->
</head>
<body>
    <div class="container"> <!-- Contenedor principal -->
        <h2>Gestor de tareas</h2> <!-- Encabezado -->
        <input type="text" id="taskInput" placeholder="Adiccionar nueva tarea...">  <!--// Caja de texto-->
        <button id="addBtn">Agregar</button> <!--Boton para añadir tarea-->
        <ul id="taskList"></ul>  <!-- Lista donde se mostraran las tareas-->
    </div>
    
    <script src="script.js"></script> <!--Conecta el archivo Javascript -->
</body>

</html>
